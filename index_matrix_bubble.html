<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LSO API Implementation Matrix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #F0F4F9;
      --grid:     rgba(61,123,199,0.06);
      --text:     #1A2744;
      --muted:    rgba(26,39,68,0.5);
      --buy:      #3D7BC7;
      --sell:     #FD7801;
      --both:     #9C27B0;
      --border:   rgba(61,123,199,0.15);
      --card:     rgba(255,255,255,0.9);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
    }

    /* Header */
    #header {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 20px 32px 0;
      z-index: 10; pointer-events: none;
      display: flex; align-items: flex-start; gap: 16px;
    }
    #logo img {
      height: 52px; width: auto;
      filter: brightness(0) saturate(100%) invert(15%) sepia(40%) saturate(800%) hue-rotate(190deg);
      opacity: 0.8;
      pointer-events: auto;
    }
    #titles { flex: 1; }
    #title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 24px; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--text); line-height: 1;
      opacity: 0; animation: slideDown .6s ease .2s forwards;
      visibility: hidden;
    }
    #subtitle {
      margin-top: 4px; font-size: 14px;
      color: var(--muted);
      opacity: 0; animation: slideDown .6s ease .4s forwards;
      visibility: hidden;
    }
    @keyframes slideDown {
      from { opacity:0; transform:translateY(-8px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes slideUp {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* Mplify logo top right */
    #logo-right {
      position: fixed; top: 20px; right: 32px;
      z-index: 10;
      opacity: 0; animation: slideDown .6s ease .5s forwards;
    }
    #logo-right img {
      height: 52px; width: auto;
      filter: brightness(0) saturate(100%) invert(15%) sepia(40%) saturate(800%) hue-rotate(190deg);
      opacity: 0.75;
    }

    /* Legend */
    #legend {
      position: fixed; bottom: 24px; left: 32px;
      display: flex; gap: 24px; align-items: center;
      z-index: 10;
      opacity: 0; animation: slideUp .6s ease .8s forwards;
    }
    .leg { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
    .leg-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .leg-bubble {
      border-radius: 50%; background: var(--buy);
      opacity: 0.7; flex-shrink: 0;
    }

    /* Hint */
    #hint {
      position: fixed; bottom: 24px; right: 32px;
      font-size: 11px; color: var(--muted);
      z-index: 10;
      opacity: 0; animation: slideUp .6s ease .9s forwards;
    }

    /* Tooltip */
    #tooltip {
      position: fixed;
      background: rgba(255,255,255,0.97);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      pointer-events: none;
      z-index: 20;
      opacity: 0; transition: opacity .15s;
      box-shadow: 0 4px 20px rgba(61,123,199,0.15);
      max-width: 200px;
    }
    #tooltip .tip-company { font-weight: 600; color: var(--text); margin-bottom: 3px; }
    #tooltip .tip-api     { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    #tooltip .tip-side    { font-size: 11px; font-weight: 500; }
    #tooltip .tip-imp     { font-size: 11px; color: var(--muted); }

    /* SVG */
    #chart {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
    }

    /* Loading */
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center; gap: 14px;
      background: var(--bg); z-index: 100;
      transition: opacity .5s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--buy);
    }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: var(--buy); margin: 0 3px;
      animation: pulse 1.2s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes pulse {
      0%,80%,100% { transform:scale(.6); opacity:.4; }
      40%          { transform:scale(1);  opacity:1;  }
    }
  </style>
</head>
<body>

  <div id="loading">
    <div id="loading-text">Building Matrix</div>
    <div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
  </div>

  <div id="header">
    <div id="logo">
      <img src="https://mplify-products.github.io/lso-apis/Mplify-logo.png" alt="Mplify" />
    </div>
    <div id="titles">
      <div id="title" style="visibility:hidden">LSO API Implementation Matrix</div>
      <div id="subtitle" style="visibility:hidden">Partner implementations across LSO APIs</div>
    </div>
  </div>

  <div id="logo-right">
    <img src="https://www.mplify.net/wp-content/themes/base/images/logo.svg" alt="Mplify Alliance" />
  </div>

  <div id="legend">
    <div class="leg"><div class="leg-dot" style="background:var(--buy)"></div>Buy Side</div>
    <div class="leg"><div class="leg-dot" style="background:var(--sell)"></div>Sell Side</div>
    <div class="leg"><div class="leg-dot" style="background:var(--both)"></div>Both Sides</div>
    <div class="leg" style="gap:6px">
      <div class="leg-bubble" style="width:18px;height:18px;background:var(--buy)"></div>
      <div class="leg-bubble" style="width:12px;height:12px;background:var(--buy)"></div>
      <div class="leg-bubble" style="width:7px;height:7px;background:var(--buy)"></div>
      <span>High / Medium / Low importance</span>
    </div>
  </div>
  <div id="hint">Hover for details</div>

  <svg id="chart"></svg>
  <div id="tooltip">
    <div class="tip-company"></div>
    <div class="tip-api"></div>
    <div class="tip-side"></div>
    <div class="tip-imp"></div>
  </div>

  <script>
  (async function() {

    /* ── CONFIG ──────────────────────────────────────────────────── */
    const SHEET_ID  = "1xY0ZnweIXE3pDPyTfiT3nsvB7wCchLZIW5D6jAOFzuQ";
    const API_KEY   = "AIzaSyBO2A-xcrPpcj9g0ebdlnDlx1AjvP90xzQ";
    const API_BASE  = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values`;

    const GID_TO_NAME = {
      "399938948":  "menu",
      "1901457844": "meta-nodes",
      "1881293424": "lso.av2.links",
      "1279159249": "lso.poq2.links",
      "2008560393": "lso.q4.links",
      "930832971":  "lso.po5.links",
    };

    const LINKS_GID_TO_COL = {
      "1881293424": "lso.av2",
      "1279159249": "lso.poq2",
      "2008560393": "lso.q4",
      "930832971":  "lso.po5",
    };

    /* ── FETCH ───────────────────────────────────────────────────── */
    async function fetchSheet(gid) {
      const name = GID_TO_NAME[gid];
      if (!name) throw new Error("Unknown GID: " + gid);
      const resp = await fetch(`${API_BASE}/${encodeURIComponent(name)}?key=${API_KEY}`);
      if (!resp.ok) throw new Error("HTTP " + resp.status);
      const json = await resp.json();
      const rows = json.values || [];
      if (rows.length < 2) return [];
      const headers = rows[0].map(h => h.trim());
      return rows.slice(1).map(row => {
        const obj = {};
        headers.forEach((h, i) => obj[h] = row[i] || "");
        return obj;
      });
    }

    /* ── LOAD DATA ───────────────────────────────────────────────── */
    let menuRows, metaRows;
    try {
      [menuRows, metaRows] = await Promise.all([
        fetchSheet("399938948"),
        fetchSheet("1901457844"),
      ]);
    } catch(e) {
      console.error("Failed to fetch data:", e);
      document.getElementById("loading-text").textContent = "Failed to load data";
      return;
    }

    const apis = menuRows.filter(r => r.label && r.links_gid);
    const companies = metaRows.filter(r => r.type === "company");

    // Build matrix data: for each company × API, determine side and importance
    const cells = [];
    companies.forEach(company => {
      apis.forEach(api => {
        const col = LINKS_GID_TO_COL[api.links_gid];
        if (!col) return;
        const val = company[col] ? company[col].toLowerCase() : "";
        if (val !== "yes") return;
        // Determine side by group
        const side = company.group || "buy";
        cells.push({
          company:    company.label || company.id,
          companyId:  company.id,
          api:        api["main title"] || api.label,
          apiShort:   api.sheet || api.links_gid,
          side:       side,
          importance: (company.importance || "medium").toLowerCase(),
          url:        company.url || null,
        });
      });
    });

    // Detect companies on both sides (same label in buy AND sell)
    const buyLabels  = new Set(companies.filter(c => c.group === "buy").map(c => c.label));
    const sellLabels = new Set(companies.filter(c => c.group === "sell").map(c => c.label));
    const bothLabels = new Set([...buyLabels].filter(l => sellLabels.has(l)));

    cells.forEach(c => {
      if (bothLabels.has(c.company)) c.sideColor = "both";
      else if (c.side === "buy")  c.sideColor = "buy";
      else                        c.sideColor = "sell";
    });

    /* ── UNIQUE ROWS / COLS ──────────────────────────────────────── */
    // Deduplicate companies (same label may appear as buy and sell)
    const uniqueCompanies = [...new Set(companies.map(c => c.label))].sort();
    const uniqueApis      = apis.map(a => a["main title"] || a.label);

    /* ── BUBBLE SIZE ─────────────────────────────────────────────── */
    const impRadius = { high: 18, medium: 12, low: 7 };

    /* ── SVG SETUP ───────────────────────────────────────────────── */
    const W = window.innerWidth, H = window.innerHeight;
    const margin = { top: 100, right: 180, bottom: 80, left: 220 };
    const innerW  = W - margin.left - margin.right;
    const innerH  = H - margin.top  - margin.bottom;

    const svg = d3.select("#chart")
      .attr("viewBox", [0, 0, W, H]);

    const g = svg.append("g")
      .attr("transform", `translate(${margin.left},${margin.top})`);

    /* ── SCALES ──────────────────────────────────────────────────── */
    const xScale = d3.scaleBand()
      .domain(uniqueApis)
      .range([0, innerW])
      .padding(0.3);

    const yScale = d3.scaleBand()
      .domain(uniqueCompanies)
      .range([0, innerH])
      .padding(0.3);

    const colorMap = { buy: "#3D7BC7", sell: "#FD7801", both: "#9C27B0" };

    /* ── GRID LINES ──────────────────────────────────────────────── */
    // Horizontal grid
    g.append("g").selectAll("line")
      .data(uniqueCompanies).join("line")
      .attr("x1", 0).attr("x2", innerW)
      .attr("y1", d => yScale(d) + yScale.bandwidth() / 2)
      .attr("y2", d => yScale(d) + yScale.bandwidth() / 2)
      .attr("stroke", "rgba(61,123,199,0.08)")
      .attr("stroke-width", 1);

    // Vertical grid
    g.append("g").selectAll("line")
      .data(uniqueApis).join("line")
      .attr("x1", d => xScale(d) + xScale.bandwidth() / 2)
      .attr("x2", d => xScale(d) + xScale.bandwidth() / 2)
      .attr("y1", 0).attr("y2", innerH)
      .attr("stroke", "rgba(61,123,199,0.08)")
      .attr("stroke-width", 1);

    /* ── X AXIS (APIs) ───────────────────────────────────────────── */
    const xAxis = g.append("g").attr("transform", `translate(0,-10)`);
    xAxis.selectAll("text")
      .data(uniqueApis).join("text")
      .attr("x", d => xScale(d) + xScale.bandwidth() / 2)
      .attr("y", 0)
      .attr("text-anchor", "middle")
      .attr("dominant-baseline", "auto")
      .attr("font-family", "'Barlow Condensed', sans-serif")
      .attr("font-size", "12px")
      .attr("font-weight", 600)
      .attr("letter-spacing", "0.5px")
      .attr("fill", "#1A2744")
      .each(function(d) {
        // Wrap long API names
        const words = d.split(" ");
        const el = d3.select(this);
        const lineH = 13;
        const lines = [];
        let cur = [];
        words.forEach(w => {
          const test = [...cur, w].join(" ");
          if (test.length > 22 && cur.length) { lines.push(cur.join(" ")); cur = [w]; }
          else cur.push(w);
        });
        if (cur.length) lines.push(cur.join(" "));
        const totalH = (lines.length - 1) * lineH;
        lines.forEach((line, i) => {
          el.append("tspan")
            .attr("x", xScale(d) + xScale.bandwidth() / 2)
            .attr("dy", i === 0 ? -totalH : lineH)
            .text(line);
        });
      });

    /* ── Y AXIS (Companies) ──────────────────────────────────────── */
    g.append("g").selectAll("text")
      .data(uniqueCompanies).join("text")
      .attr("x", -12)
      .attr("y", d => yScale(d) + yScale.bandwidth() / 2)
      .attr("text-anchor", "end")
      .attr("dominant-baseline", "central")
      .attr("font-family", "'DM Sans', sans-serif")
      .attr("font-size", "12px")
      .attr("fill", "#1A2744")
      .text(d => d);

    /* ── BUBBLES ─────────────────────────────────────────────────── */
    const tooltip = document.getElementById("tooltip");

    g.append("g").selectAll("circle")
      .data(cells).join("circle")
      .attr("cx", d => xScale(d.api) + xScale.bandwidth() / 2)
      .attr("cy", d => yScale(d.company) + yScale.bandwidth() / 2)
      .attr("r", 0)
      .attr("fill", d => colorMap[d.sideColor])
      .attr("opacity", 0.75)
      .attr("stroke", d => colorMap[d.sideColor])
      .attr("stroke-width", 1.5)
      .attr("stroke-opacity", 0.4)
      .style("cursor", "pointer")
      .on("mouseover", (e, d) => {
        tooltip.querySelector(".tip-company").textContent = d.company;
        tooltip.querySelector(".tip-api").textContent     = d.api;
        tooltip.querySelector(".tip-side").textContent    = d.side.charAt(0).toUpperCase() + d.side.slice(1) + " Side";
        tooltip.querySelector(".tip-side").style.color    = colorMap[d.sideColor];
        tooltip.querySelector(".tip-imp").textContent     = "Importance: " + d.importance.charAt(0).toUpperCase() + d.importance.slice(1);
        tooltip.style.opacity = "1";
        moveTip(e);
      })
      .on("mousemove", e => moveTip(e))
      .on("mouseout",  () => { tooltip.style.opacity = "0"; })
      .transition().duration(600)
      .delay((d, i) => i * 15)
      .attr("r", d => impRadius[d.importance] || 12);

    function moveTip(e) {
      const x = e.clientX + 12, y = e.clientY - 10;
      tooltip.style.left = (x + tooltip.offsetWidth  > window.innerWidth  ? x - tooltip.offsetWidth  - 24 : x) + "px";
      tooltip.style.top  = (y + tooltip.offsetHeight > window.innerHeight ? y - tooltip.offsetHeight      : y) + "px";
    }

    /* ── TITLE / SUBTITLE ────────────────────────────────────────── */
    const titleEl    = document.getElementById("title");
    const subtitleEl = document.getElementById("subtitle");
    titleEl.style.visibility    = "visible";
    subtitleEl.style.visibility = "visible";

    /* ── HIDE LOADING ────────────────────────────────────────────── */
    document.getElementById("loading").classList.add("hidden");
    setTimeout(() => document.getElementById("loading").style.display = "none", 600);

    /* ── RESIZE ──────────────────────────────────────────────────── */
    window.addEventListener("resize", () => location.reload());

  })();
  </script>
</body>
</html>
