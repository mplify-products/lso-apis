<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LSO API Adoption — Buy vs Sell</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:    #F0F4F9;
      --grid:  rgba(61,123,199,0.05);
      --text:  #1A2744;
      --muted: rgba(26,39,68,0.45);
      --buy:   #3D7BC7;
      --sell:  #FD7801;
      --both:  #9C27B0;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
    }

    /* Header */
    #header {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 20px 32px 0;
      z-index: 10; pointer-events: none;
      display: flex; align-items: flex-start; gap: 16px;
    }
    #logo img {
      height: 52px; width: auto;
      filter: brightness(0) saturate(100%) invert(15%) sepia(40%) saturate(800%) hue-rotate(190deg);
      opacity: 0.8;
    }
    #titles { flex: 1; }
    #title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 24px; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--text); line-height: 1;
      opacity: 0; animation: slideDown .6s ease .2s forwards;
      visibility: hidden;
    }
    #subtitle {
      margin-top: 4px; font-size: 14px;
      color: var(--muted);
      opacity: 0; animation: slideDown .6s ease .4s forwards;
      visibility: hidden;
    }
    @keyframes slideDown {
      from { opacity:0; transform:translateY(-8px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes slideUp {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* Logo top right */
    #logo-right {
      position: fixed; top: 20px; right: 32px;
      z-index: 10;
      opacity: 0; animation: slideDown .6s ease .5s forwards;
    }
    #logo-right img {
      height: 52px; width: auto;
      filter: brightness(0) saturate(100%) invert(15%) sepia(40%) saturate(800%) hue-rotate(190deg);
      opacity: 0.75;
    }

    /* Legend */
    #legend {
      position: fixed; bottom: 24px; left: 32px;
      display: flex; flex-wrap: wrap; gap: 20px; align-items: center;
      z-index: 10;
      opacity: 0; animation: slideUp .6s ease .8s forwards;
    }
    .leg { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
    .leg-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

    /* Size legend */
    #size-legend {
      position: fixed; bottom: 24px; right: 32px;
      display: flex; align-items: flex-end; gap: 8px;
      z-index: 10;
      opacity: 0; animation: slideUp .6s ease .9s forwards;
    }
    .size-item {
      display: flex; flex-direction: column;
      align-items: center; gap: 4px;
      font-size: 10px; color: var(--muted);
    }
    .size-circle {
      border-radius: 50%;
      background: var(--buy); opacity: 0.6;
    }

    /* Cluster labels */
    .cluster-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 36px; font-weight: 800;
      letter-spacing: 2px; text-transform: uppercase;
      pointer-events: none;
    }
    .cluster-sublabel {
      font-size: 13px; pointer-events: none;
    }

    /* Tooltip */
    #tooltip {
      position: fixed;
      background: rgba(255,255,255,0.97);
      border: 1px solid rgba(61,123,199,0.2);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      pointer-events: none;
      z-index: 20;
      opacity: 0; transition: opacity .15s;
      box-shadow: 0 4px 20px rgba(61,123,199,0.15);
    }
    #tooltip .tip-name  { font-weight: 600; color: var(--text); margin-bottom: 4px; }
    #tooltip .tip-count { font-size: 11px; margin-bottom: 2px; }
    #tooltip .tip-apis  { font-size: 11px; color: var(--muted); }

    /* SVG */
    #chart { position: fixed; inset: 0; width: 100%; height: 100%; }

    /* Loading */
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center; gap: 14px;
      background: var(--bg); z-index: 100;
      transition: opacity .5s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--buy);
    }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: var(--buy); margin: 0 3px;
      animation: pulse 1.2s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes pulse {
      0%,80%,100% { transform:scale(.6); opacity:.4; }
      40%          { transform:scale(1);  opacity:1;  }
    }
  </style>
</head>
<body>

  <div id="loading">
    <div id="loading-text">Building Adoption Chart</div>
    <div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
  </div>

  <div id="header">
    <div id="logo">
      <img src="https://mplify-products.github.io/lso-apis/Mplify-logo.png" alt="Mplify" />
    </div>
    <div id="titles">
      <div id="title" style="visibility:hidden">LSO API Adoption</div>
      <div id="subtitle" style="visibility:hidden">Companies sized by number of APIs implemented</div>
    </div>
  </div>

  <div id="logo-right">
    <img src="https://www.mplify.net/wp-content/themes/base/images/logo.svg" alt="Mplify Alliance" />
  </div>

  <div id="legend">
    <div class="leg"><div class="leg-dot" style="background:var(--buy)"></div>Buy Side only</div>
    <div class="leg"><div class="leg-dot" style="background:var(--sell)"></div>Sell Side only</div>
    <div class="leg"><div class="leg-dot" style="background:var(--both)"></div>Both Sides</div>
  </div>

  <div id="size-legend">
    <div class="size-item">
      <div class="size-circle" style="width:14px;height:14px"></div>
      <span>1 API</span>
    </div>
    <div class="size-item">
      <div class="size-circle" style="width:22px;height:22px"></div>
      <span>2 APIs</span>
    </div>
    <div class="size-item">
      <div class="size-circle" style="width:32px;height:32px"></div>
      <span>3 APIs</span>
    </div>
    <div class="size-item">
      <div class="size-circle" style="width:44px;height:44px"></div>
      <span>4 APIs</span>
    </div>
  </div>

  <svg id="chart"></svg>
  <div id="tooltip">
    <div class="tip-name"></div>
    <div class="tip-count"></div>
    <div class="tip-apis"></div>
  </div>

  <script>
  (async function() {

    /* ── CONFIG ──────────────────────────────────────────────────── */
    const SHEET_ID  = "1xY0ZnweIXE3pDPyTfiT3nsvB7wCchLZIW5D6jAOFzuQ";
    const API_KEY   = "YOUR_API_KEY_HERE";
    const API_BASE  = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values`;

    const GID_TO_NAME = {
      "399938948":  "menu",
      "1901457844": "meta-nodes",
    };

    const LINKS_GID_TO_COL = {
      "1881293424": "lso.av2",
      "1279159249": "lso.poq2",
      "2008560393": "lso.q4",
      "930832971":  "lso.po5",
    };

    /* ── FETCH ───────────────────────────────────────────────────── */
    async function fetchSheet(gid) {
      const name = GID_TO_NAME[gid];
      if (!name) throw new Error("Unknown GID: " + gid);
      const resp = await fetch(`${API_BASE}/${encodeURIComponent(name)}?key=${API_KEY}`);
      if (!resp.ok) throw new Error("HTTP " + resp.status);
      const json = await resp.json();
      const rows = json.values || [];
      if (rows.length < 2) return [];
      const headers = rows[0].map(h => h.trim());
      return rows.slice(1).map(row => {
        const obj = {};
        headers.forEach((h, i) => obj[h] = row[i] || "");
        return obj;
      });
    }

    /* ── LOAD DATA ───────────────────────────────────────────────── */
    let menuRows, metaRows;
    try {
      [menuRows, metaRows] = await Promise.all([
        fetchSheet("399938948"),
        fetchSheet("1901457844"),
      ]);
    } catch(e) {
      console.error("Failed to fetch data:", e);
      document.getElementById("loading-text").textContent = "Failed to load data";
      return;
    }

    const apis     = menuRows.filter(r => r.label && r.links_gid);
    const companies = metaRows.filter(r => r.type === "company");

    // For each unique company label, count how many APIs they implement
    // and determine their side
    const companyMap = {};
    companies.forEach(c => {
      const label = c.label || c.id;
      if (!companyMap[label]) {
        companyMap[label] = { label, group: c.group, apis: [], url: c.url || null };
      }
      apis.forEach(api => {
        const col = LINKS_GID_TO_COL[api.links_gid];
        if (!col) return;
        const val = c[col] ? c[col].toLowerCase() : "";
        if (val === "yes") {
          const apiName = api["main title"] || api.label;
          if (!companyMap[label].apis.includes(apiName)) {
            companyMap[label].apis.push(apiName);
          }
        }
      });
    });

    // Determine side: buy-only, sell-only, or both
    const buyLabels  = new Set(companies.filter(c => c.group === "buy").map(c => c.label));
    const sellLabels = new Set(companies.filter(c => c.group === "sell").map(c => c.label));

    const nodes = Object.values(companyMap)
      .filter(c => c.apis.length > 0)
      .map(c => {
        const isBuy  = buyLabels.has(c.label);
        const isSell = sellLabels.has(c.label);
        return {
          ...c,
          side:  isBuy && isSell ? "both" : isBuy ? "buy" : "sell",
          count: c.apis.length,
        };
      });

    /* ── SVG SETUP ───────────────────────────────────────────────── */
    const W = window.innerWidth, H = window.innerHeight;
    const svg = d3.select("#chart").attr("viewBox", [0, 0, W, H]);

    const colorMap = { buy: "#3D7BC7", sell: "#FD7801", both: "#9C27B0" };

    // Radius scale: 1 API → 22px, 4 APIs → 52px
    const rScale = d3.scaleSqrt().domain([1, 4]).range([22, 52]).clamp(true);

    // Split nodes into clusters
    const buyNodes  = nodes.filter(n => n.side === "buy");
    const sellNodes = nodes.filter(n => n.side === "sell");
    const bothNodes = nodes.filter(n => n.side === "both");

    // Cluster centres
    const buyCx  = W * 0.25;
    const sellCx = W * 0.72;
    const bothCx = W * 0.5;
    const cy     = H * 0.52;

    // Assign initial positions per cluster
    function assignCluster(ns, cx, cy2) {
      ns.forEach(n => { n.x = cx + (Math.random() - 0.5) * 80; n.y = cy2 + (Math.random() - 0.5) * 80; });
    }
    assignCluster(buyNodes,  buyCx,  cy);
    assignCluster(sellNodes, sellCx, cy);
    assignCluster(bothNodes, bothCx, cy - 60);

    const allNodes = [...buyNodes, ...sellNodes, ...bothNodes];

    /* ── CLUSTER BACKGROUND CIRCLES ──────────────────────────────── */
    const clusters = [
      { cx: buyCx,  cy, r: 160, color: "#3D7BC7", label: "BUY SIDE",  sub: `${buyNodes.length} companies` },
      { cx: sellCx, cy, r: 160, color: "#FD7801", label: "SELL SIDE", sub: `${sellNodes.length} companies` },
    ];
    if (bothNodes.length) {
      clusters.push({ cx: bothCx, cy: cy - 120, r: 100, color: "#9C27B0", label: "BOTH SIDES", sub: `${bothNodes.length} companies` });
    }

    clusters.forEach(cl => {
      svg.append("circle")
        .attr("cx", cl.cx).attr("cy", cl.cy).attr("r", 0)
        .attr("fill", cl.color).attr("opacity", 0.05)
        .attr("stroke", cl.color).attr("stroke-opacity", 0.15)
        .attr("stroke-width", 1.5)
        .attr("stroke-dasharray", "6 4")
        .transition().duration(800).delay(200)
        .attr("r", cl.r);

      svg.append("text")
        .attr("class", "cluster-label")
        .attr("x", cl.cx).attr("y", cl.cy - cl.r - 16)
        .attr("text-anchor", "middle")
        .attr("fill", cl.color).attr("opacity", 0)
        .text(cl.label)
        .transition().duration(600).delay(500)
        .attr("opacity", 0.6);

      svg.append("text")
        .attr("class", "cluster-sublabel")
        .attr("x", cl.cx).attr("y", cl.cy - cl.r + 2)
        .attr("text-anchor", "middle")
        .attr("fill", cl.color).attr("opacity", 0)
        .attr("font-family", "'DM Sans', sans-serif")
        .text(cl.sub)
        .transition().duration(600).delay(600)
        .attr("opacity", 0.5);
    });

    /* ── FORCE SIMULATION ────────────────────────────────────────── */
    const sim = d3.forceSimulation(allNodes)
      .force("x", d3.forceX(d => {
        if (d.side === "buy")  return buyCx;
        if (d.side === "sell") return sellCx;
        return bothCx;
      }).strength(0.35))
      .force("y", d3.forceY(d => d.side === "both" ? cy - 100 : cy).strength(0.35))
      .force("collide", d3.forceCollide(d => rScale(d.count) + 4).strength(0.9))
      .force("charge", d3.forceManyBody().strength(-20))
      .stop();

    // Run simulation offline
    for (let i = 0; i < 200; i++) sim.tick();

    /* ── DRAW BUBBLES ────────────────────────────────────────────── */
    const tooltip = document.getElementById("tooltip");

    const bubbles = svg.append("g").selectAll("g")
      .data(allNodes).join("g")
      .attr("transform", d => `translate(${d.x},${d.y})`)
      .style("cursor", "pointer");

    // Circle
    bubbles.append("circle")
      .attr("r", 0)
      .attr("fill", d => colorMap[d.side])
      .attr("opacity", 0.75)
      .attr("stroke", d => colorMap[d.side])
      .attr("stroke-width", 2)
      .attr("stroke-opacity", 0.4)
      .transition().duration(700)
      .delay((d, i) => 300 + i * 40)
      .attr("r", d => rScale(d.count));

    // Label
    bubbles.append("text")
      .attr("text-anchor", "middle")
      .attr("dominant-baseline", "central")
      .attr("fill", "#fff")
      .attr("font-family", "'DM Sans', sans-serif")
      .attr("font-size", d => rScale(d.count) > 32 ? "11px" : "9px")
      .attr("font-weight", 600)
      .attr("pointer-events", "none")
      .attr("opacity", 0)
      .text(d => d.label)
      .transition().duration(400).delay((d, i) => 500 + i * 40)
      .attr("opacity", 1);

    // API count badge
    bubbles.append("text")
      .attr("text-anchor", "middle")
      .attr("dominant-baseline", "central")
      .attr("y", d => rScale(d.count) - 10)
      .attr("fill", "#fff")
      .attr("font-family", "'Barlow Condensed', sans-serif")
      .attr("font-size", "10px")
      .attr("font-weight", 700)
      .attr("opacity", 0)
      .attr("pointer-events", "none")
      .text(d => d.count > 1 ? `${d.count} APIs` : "1 API")
      .transition().duration(400).delay((d, i) => 600 + i * 40)
      .attr("opacity", d => rScale(d.count) > 28 ? 0.85 : 0);

    // Tooltip
    bubbles
      .on("mouseover", (e, d) => {
        tooltip.querySelector(".tip-name").textContent  = d.label;
        tooltip.querySelector(".tip-count").textContent = `Implements ${d.count} of ${apis.length} APIs`;
        tooltip.querySelector(".tip-count").style.color = colorMap[d.side];
        tooltip.querySelector(".tip-apis").textContent  = d.apis.join(" · ");
        tooltip.style.opacity = "1";
        moveTip(e);
      })
      .on("mousemove", e => moveTip(e))
      .on("mouseout",  () => { tooltip.style.opacity = "0"; });

    function moveTip(e) {
      const x = e.clientX + 12, y = e.clientY - 10;
      tooltip.style.left = (x + tooltip.offsetWidth  > window.innerWidth  ? x - tooltip.offsetWidth  - 24 : x) + "px";
      tooltip.style.top  = (y + tooltip.offsetHeight > window.innerHeight ? y - tooltip.offsetHeight      : y) + "px";
    }

    /* ── TITLE ───────────────────────────────────────────────────── */
    document.getElementById("title").style.visibility    = "visible";
    document.getElementById("subtitle").style.visibility = "visible";

    /* ── HIDE LOADING ────────────────────────────────────────────── */
    document.getElementById("loading").classList.add("hidden");
    setTimeout(() => document.getElementById("loading").style.display = "none", 600);

  })();
  </script>
</body>
</html>
